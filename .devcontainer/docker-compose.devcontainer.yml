# Dev Container overlay — adds the app service to the existing infrastructure
# This file is merged with the root docker-compose.yml by devcontainer.json

services:
  app:
    build:
      context: ..
      dockerfile: .devcontainer/Dockerfile
    volumes:
      - ..:/workspace:cached
      - naap-node-modules:/workspace/node_modules
    command: sleep infinity
    environment:
      # Database (matches docker-compose.yml database service)
      DATABASE_URL: postgresql://postgres:postgres@database:5432/naap
      # Kafka
      KAFKA_BROKERS: kafka:9093
      # Dev defaults
      NODE_ENV: development
      SHELL_PORT: 3000
      BASE_SVC_PORT: 4000
      PLUGIN_SERVER_PORT: 3100
    ports:
      - "3000:3000"
      - "3100:3100"
      - "4000:4000"
      - "4020:4020"
    depends_on:
      database:
        condition: service_healthy
      kafka:
        condition: service_healthy
    networks:
      - naap-network

volumes:
  naap-node-modules:
