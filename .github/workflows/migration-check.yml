# ---------------------------------------------------------------------------
# Detect Prisma schema changes and flag PRs that include database migrations.
# Adds a label, posts a warning comment, and requests a core team review.
# ---------------------------------------------------------------------------
name: Migration Check

on:
  pull_request:

permissions:
  contents: read
  pull-requests: write

jobs:
  detect-migrations:
    name: Check for Prisma schema changes
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Detect Prisma file changes
        id: filter
        uses: dorny/paths-filter@v3
        with:
          filters: |
            prisma:
              - '**/*.prisma'

      - name: Flag migration PR
        if: steps.filter.outputs.prisma == 'true'
        uses: actions/github-script@v8
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
          script: |
            const prNumber = context.payload.pull_request.number;
            const marker = '<!-- migration-check-bot -->';

            // Add migration label
            await github.rest.issues.addLabels({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: prNumber,
              labels: ['has-migration'],
            });

            // Check for existing bot comment to avoid duplicates
            const { data: comments } = await github.rest.issues.listComments({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: prNumber,
            });

            if (!comments.some(c => c.body.includes(marker))) {
              await github.rest.issues.createComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: prNumber,
                body: [
                  marker,
                  '🗃️ **Database Migration Detected**',
                  '',
                  'This PR includes changes to Prisma schema files. Please ensure:',
                  '',
                  '- [ ] Migration is backward-compatible or a rollback plan exists',
                  '- [ ] Data migration scripts are included if needed',
                  '- [x] Schema changes will be auto-applied to the **preview database** (Neon preview branch) during the Vercel preview deployment',
                  '- [ ] Verify the preview deployment works correctly with the new schema',
                  '- [ ] On merge to main, schema changes will auto-promote to **production** via `prisma db push`',
                  '',
                  '> **Preview DB**: This PR\'s Vercel preview deployment uses an isolated Neon database branch. Schema changes are applied automatically via `prisma db push` during the preview build. The preview branch is reset after each production deploy.',
                  '',
                  'Requesting review from the core team: @livepeer/core',
                ].join('\n'),
              });
            }
