# Deploy an artifact to a serverless GPU provider via the Deployment Manager API
name: "CD: Deploy to Serverless Provider"

on:
  workflow_dispatch:
    inputs:
      artifact:
        description: "Artifact type (ai-runner or scope)"
        required: true
        type: choice
        options:
          - ai-runner
          - scope
      version:
        description: "Artifact version tag"
        required: true
        type: string
      provider:
        description: "GPU provider"
        required: true
        type: choice
        options:
          - runpod
          - fal-ai
          - baseten
          - modal
          - replicate
      gpu_model:
        description: "GPU model (e.g., NVIDIA A100 80GB)"
        required: true
        default: "NVIDIA A100 80GB"
        type: string
      deployment_name:
        description: "Deployment name"
        required: true
        type: string

env:
  NAAP_API_URL: ${{ secrets.NAAP_API_URL || 'http://localhost:3000' }}

jobs:
  deploy:
    name: Deploy ${{ inputs.artifact }} ${{ inputs.version }} to ${{ inputs.provider }}
    runs-on: ubuntu-latest
    environment:
      name: ${{ inputs.provider }}-${{ inputs.deployment_name }}

    steps:
      - name: Determine Docker Image
        id: image
        run: |
          if [ "${{ inputs.artifact }}" = "ai-runner" ]; then
            echo "image=livepeer/ai-runner:${{ inputs.version }}" >> "$GITHUB_OUTPUT"
          else
            echo "image=daydreamlive/scope:${{ inputs.version }}" >> "$GITHUB_OUTPUT"
          fi

      - name: Create Deployment
        id: create
        run: |
          RESPONSE=$(curl -sf -X POST "${{ env.NAAP_API_URL }}/api/v1/deployment-manager/deployments" \
            -H "Content-Type: application/json" \
            -H "Authorization: Bearer ${{ secrets.NAAP_API_KEY }}" \
            -d '{
              "name": "${{ inputs.deployment_name }}",
              "providerSlug": "${{ inputs.provider }}",
              "gpuModel": "${{ inputs.gpu_model }}",
              "gpuVramGb": 80,
              "gpuCount": 1,
              "artifactType": "${{ inputs.artifact }}",
              "artifactVersion": "${{ inputs.version }}",
              "dockerImage": "${{ steps.image.outputs.image }}"
            }')
          DEPLOYMENT_ID=$(echo "$RESPONSE" | jq -r '.data.id')
          echo "deployment_id=$DEPLOYMENT_ID" >> "$GITHUB_OUTPUT"
          echo "Deployment created: $DEPLOYMENT_ID"

      - name: Deploy and Validate
        run: |
          RESPONSE=$(curl -sf -X POST \
            "${{ env.NAAP_API_URL }}/api/v1/deployment-manager/deployments/${{ steps.create.outputs.deployment_id }}/deploy-and-validate?retries=2" \
            -H "Authorization: Bearer ${{ secrets.NAAP_API_KEY }}")
          STATUS=$(echo "$RESPONSE" | jq -r '.data.status')
          echo "Deployment status: $STATUS"
          if [ "$STATUS" != "ONLINE" ]; then
            echo "::error::Deployment failed with status: $STATUS"
            exit 1
          fi

      - name: Update GitHub Deployment Status
        if: always()
        run: |
          STATUS_RESPONSE=$(curl -sf "${{ env.NAAP_API_URL }}/api/v1/deployment-manager/deployments/${{ steps.create.outputs.deployment_id }}" \
            -H "Authorization: Bearer ${{ secrets.NAAP_API_KEY }}")
          ENDPOINT=$(echo "$STATUS_RESPONSE" | jq -r '.data.endpointUrl // "N/A"')
          FINAL_STATUS=$(echo "$STATUS_RESPONSE" | jq -r '.data.status')
          echo "Final status: $FINAL_STATUS, Endpoint: $ENDPOINT"
